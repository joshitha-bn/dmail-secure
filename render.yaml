services:
  - type: web
    name: dmail-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # ── CORS ──
      - key: CORS_ORIGIN
        value: "*"

      # ── SMTP (Gmail App Password) ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_EMAIL
        value: etherxinnovdmail@gmail.com
      - key: SMTP_PASSWORD
        value: hhnxsxkjpretvpzn
      # SMTP_FROM forces Gmail to accept our authenticated From address
      - key: SMTP_FROM
        value: "EtherX DMail <etherxinnovdmail@gmail.com>"

      # ── IMAP (Gmail App Password) ──
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: IMAP_PORT
        value: "993"
      - key: IMAP_SECURE
        value: "true"
      - key: IMAP_USER
        value: etherxinnovdmail@gmail.com
      - key: IMAP_PASSWORD
        value: hhnxsxkjpretvpzn

      # ── Pinata (IPFS for attachments) ──
      # Set this to your Pinata JWT from https://app.pinata.cloud/keys
      - key: PINATA_JWT
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..4icBy6L-QfVx4TLJrnQhXEH3Z3Vqy_WOzuIxkf-Gx1o

      - key: NODE_ENV
        value: production
    plan: free
